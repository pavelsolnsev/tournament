# Линт, типы, тесты и production-сборка на каждый push/PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: ESLint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test --run

      - name: Production build
        run: yarn build
