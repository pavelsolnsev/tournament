# Линт, типы, тесты и production-сборка.
# Push в master не триггерит CI — на мерже в master запускается только deploy-vps.yml (один workflow на коммит).
# Проверки перед мерджем идут через pull_request.
name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master
      - main

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: ESLint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test --run

      - name: Production build
        run: yarn build
