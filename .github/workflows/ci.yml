# Линт, типы, тесты и production-сборка на каждый push/PR.
# На push в master полную сборку не дублируем: тот же commit уже собирает deploy-vps.yml (меньше минут и денег в Actions).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: ESLint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test --run

      # На master push сборка только в Deploy Nuxt to VPS — иначе два полных build подряд на один коммит.
      - name: Production build
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/master'
        run: yarn build
