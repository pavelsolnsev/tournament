<!-- До загрузки Vue/Tailwind — только HTML + встроенный CSS. Спиннер: кольцо с зелёной полоской (border-top), вращение через @keyframes. -->
<div class="app">
  <style>
    html,
    body {
      height: 100%;
    }
    body {
      margin: 0;
      background: #0f172a;
      color: #f8fafc;
    }
    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      display: grid;
      justify-items: center;
      gap: 14px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
    }
    .row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .title {
      font:
        700 14px/1.2 system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Arial,
        sans-serif;
      color: #e2e8f0;
    }
    .hint {
      font:
        600 12px/1.2 system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Arial,
        sans-serif;
      color: #94a3b8;
    }
    /* Как Tailwind animate-spin + border-t-emerald: тонкое кольцо, яркая дуга сверху крутится */
    .spinner {
      box-sizing: border-box;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 3px solid rgba(52, 211, 153, 0.22);
      border-top-color: #34d399;
      animation: spa-spin 0.85s linear infinite;
    }
    @keyframes spa-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <main class="card" aria-busy="true" aria-live="polite">
    <img src="/apple-touch-icon.png" width="80" height="80" alt="Иконка приложения" class="icon" />

    <div class="row">
      <div class="spinner" aria-hidden="true"></div>
      <p class="title">Загружаем…</p>
    </div>

    <p class="hint">Почти готово</p>
  </main>
</div>
